# Making Vault optional in tests
spring.config.import=optional:vault://

# Credentials direkt (no vault in tests)
security.username=robin
security.password=secret

# Turn Redis off in tests
spring.cache.type=none

# Disable data.sql in tests (tests creates its own testdata)
spring.sql.init.mode=never

# External API URL (needed for ExternalBookService to start)
external.api.openlibrary.url=https://openlibrary.org/isbn/

# Disable Spring Cloud/Boot version compatibility check (Boot 3.5.x is newer than Cloud expects)
spring.cloud.compatibility-verifier.enabled=false

# Disable rate limiter in tests (prevents Bucket4j from returning 429 and breaking tests)
app.ratelimit.enabled=false